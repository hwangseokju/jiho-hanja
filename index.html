<!DOCTYPE html>
<html lang="ko">
<head>

    .header p { opacity: 0.9; font-size: 1.1rem; }

    /* 메뉴 화면 */
    #menu-screen .grade-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem; max-width: 900px; margin: 1.5rem auto; padding: 0 1rem;
    }
    .grade-card {
      background: rgba(255,255,255,0.15); border-radius: 1rem;
      padding: 1.5rem 1rem; text-align: center; cursor: pointer;
      transition: all 0.2s; border: 2px solid rgba(255,255,255,0.3);
      position: relative;
    }
    .grade-card:hover { background: rgba(255,255,255,0.25); transform: translateY(-5px); }
    .grade-card.locked { opacity: 0.5; cursor: not-allowed; }
    .grade-card.locked:hover { transform: none; }
    .lock-icon { position: absolute; top: 0.5rem; right: 0.5rem; font-size: 1rem; }
    .grade-card .emoji { font-size: 2.5rem; }
    .grade-card .name { font-size: 1.3rem; font-weight: bold; margin-top: 0.5rem; }

    /* 메뉴 기본 표시 */
    #menu-screen { display: block; }

    /* 등급 선택 화면 */
    #grade-screen { display: none; text-align: center; padding: 2rem 1rem; }
    .grade-title { font-size: 2rem; margin-bottom: 2rem; }
    .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .btn { padding: 1rem 2rem; font-size: 1.1rem; border: none; border-radius: 0.75rem; cursor: pointer; font-weight: bold; transition: all 0.2s; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .btn-green { background: #51cf66; color: white; }
    .btn-red { background: #ff6b6b; color: white; }
    .btn-back { background: rgba(255,255,255,0.2); color: white; border: 2px solid white; }

    /* 학습 화면 */
    #learn-screen { display: none; padding: 1rem; max-width: 900px; margin: 0 auto; }
    .learn-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .learn-title { font-size: 1.5rem; }
    .progress { font-size: 1rem; opacity: 0.8; }
    .hanja-card-big {
      background: white; color: #333; border-radius: 1.5rem;
      padding: 2rem; margin-bottom: 1.5rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .hanja-main { font-size: 6rem; text-align: center; color: #667eea; font-weight: bold; line-height: 1; margin-bottom: 1rem; }
    .hanja-hun { font-size: 1.5rem; text-align: center; color: #555; margin-bottom: 0.3rem; }
    .hanja-meaning { font-size: 1.1rem; text-align: center; color: #777; margin-bottom: 1.5rem; }
    .section { margin-bottom: 1.2rem; }
    .section-title { font-size: 1rem; font-weight: bold; color: #667eea; margin-bottom: 0.5rem; border-bottom: 2px solid #667eea; padding-bottom: 0.3rem; }
    .word-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .word-tag { background: #f0f0ff; color: #333; padding: 0.3rem 0.7rem; border-radius: 2rem; font-size: 0.9rem; }
    .antonym-box { background: #fff0f0; border-radius: 0.75rem; padding: 1rem; }
    .antonym-hanja { font-size: 2rem; color: #ff6b6b; font-weight: bold; }
    .homonym-item { background: #f0fff4; border-radius: 0.75rem; padding: 0.75rem; margin-bottom: 0.5rem; }
    .homonym-hanja { font-size: 1.5rem; color: #51cf66; font-weight: bold; }

    .toggle-btn.closed { background: #ff6b6b; color: white; }

<!-- 메뉴 화면 -->
<div id="menu-screen">
  <div class="header">
    <h1>🌟 지호한자 🌟</h1>
    <p>한자 마법으로 세상을 구하자!</p>
  </div>
  <div class="grade-grid" id="grade-grid"></div>

<!-- 등급 선택 화면 -->
<div id="grade-screen">
  <div class="header">
    <div class="grade-title" id="grade-title"></div>
    <div class="btn-group">

      <button class="btn btn-red" onclick="alert('준비 중!')">⚔️ 보스 전투</button>
    </div>
    <button class="btn btn-back" onclick="showMenu()">← 돌아가기</button>
  </div>
</div>

<!-- 학습 화면 -->
<div id="learn-screen">
  <div class="learn-header">
    <div class="learn-title" id="learn-title"></div>
    <div class="progress" id="learn-progress"></div>
  </div>
  <div class="hanja-card-big" id="hanja-card"></div>
  <div class="nav-btns">
    <button class="btn btn-back" onclick="prevHanja()">◀ 이전</button>
    <button class="btn btn-back" onclick="showGrade()">목록</button>
    <button class="btn btn-green" onclick="nextHanja()">다음 ▶</button>
  </div>
</div>

<!-- 관리자 버튼 -->
<button id="admin-btn" onclick="openAdmin()">⚙️</button>

<!-- 관리자 모달 -->
<div id="admin-modal">
  <div class="admin-box">
    <h2>🔐 관리자 패널</h2>

      <div style="margin-top:1.5rem; text-align:center;">
        <button class="btn btn-back" onclick="closeAdmin()">닫기</button>
      </div>
    </div>

  GRADES.forEach((g, i) => { locked[g.name] = i !== 0; });

let currentGrade = null;
let currentIdx = 0;
let locked = getLocked();

// 화면 전환
function showMenu() {
  document.getElementById("menu-screen").style.display = "";
  document.getElementById("grade-screen").style.display = "none";
  document.getElementById("learn-screen").style.display = "none";
  renderGradeGrid();
}
function showGrade() {
  document.getElementById("menu-screen").style.display = "none";
  document.getElementById("grade-screen").style.display = "";
  document.getElementById("learn-screen").style.display = "none";
}
function showLearn() {
  document.getElementById("menu-screen").style.display = "none";
  document.getElementById("grade-screen").style.display = "none";
  document.getElementById("learn-screen").style.display = "";
  currentIdx = 0;
  renderHanja();
}

function renderGradeGrid() {
  const grid = document.getElementById("grade-grid");
  grid.innerHTML = GRADES.map(g => {
    const isLocked = locked[g.name];
    return `<div class="grade-card ${isLocked ? 'locked' : ''}" onclick="${isLocked ? 'alert(\"🔒 잠겨있습니다! 아빠에게 열어달라고 하세요 😊\")' : `selectGrade('${g.name}')`}">
      ${isLocked ? '<span class="lock-icon">🔒</span>' : ''}
      <div class="emoji">${g.emoji}</div>
      <div class="name">${g.name}</div>
    </div>`;
  }).join("");
}

function selectGrade(name) {
  currentGrade = name;
  currentIdx = 0;
  document.getElementById("grade-title").textContent = GRADES.find(g => g.name === name).emoji + " " + name;
  showGrade();
}

function renderHanja() {
  const data = HANJA_DATA[currentGrade];
  if (!data) { alert("데이터 준비 중입니다!"); showGrade(); return; }
  const h = data[currentIdx];
  document.getElementById("learn-title").textContent = currentGrade + " 학습";
  document.getElementById("learn-progress").textContent = (currentIdx + 1) + " / " + data.length;

  let homonymHtml = "";
  if (h.homonym && h.homonym.length > 0) {
    homonymHtml = h.homonym.map(hom => `
      <div class="homonym-item">
        <div class="homonym-hanja">${hom.hanja} <span style="font-size:1rem;color:#666;">${hom.hun}</span></div>
        <div class="word-list" style="margin-top:0.4rem;">${hom.words.map(w => `<span class="word-tag">${w}</span>`).join("")}</div>
      </div>`).join("");
  } else {
    homonymHtml = "<p style='color:#999; font-size:0.9rem;'>없음</p>";
  }

  document.getElementById("hanja-card").innerHTML = `
    <div class="hanja-main">${h.hanja}</div>
    <div class="hanja-hun">${h.hun} [${h.eum}]</div>
    <div class="hanja-meaning">뜻: ${h.meaning}</div>
    <div class="section">
      <div class="section-title">📚 한자어</div>
      <div class="word-list">${h.words.map(w => `<span class="word-tag">${w}</span>`).join("")}</div>
    </div>
    <div class="section">
      <div class="section-title">↔️ 반대말</div>
      <div class="antonym-box">
        <div class="antonym-hanja">${h.antonym.hanja} <span style="font-size:1rem;color:#888;">${h.antonym.hun}</span></div>
        <div class="word-list" style="margin-top:0.5rem;">${h.antonym.words.map(w => `<span class="word-tag">${w}</span>`).join("")}</div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">🔤 동음이의어</div>
      ${homonymHtml}
    </div>
  `;
}

function nextHanja() {
  const data = HANJA_DATA[currentGrade];
  if (currentIdx < data.length - 1) { currentIdx++; renderHanja(); }
  else { alert("🎉 " + currentGrade + " 학습 완료!"); showGrade(); }
}
function prevHanja() {
  if (currentIdx > 0) { currentIdx--; renderHanja(); }
}

// 관리자
function openAdmin() { document.getElementById("admin-modal").classList.add("show"); }
function closeAdmin() {
  document.getElementById("admin-modal").classList.remove("show");
  document.getElementById("admin-login").style.display = "";
  document.getElementById("admin-panel").classList.add("hidden");
  document.getElementById("admin-pw").value = "";
}
function checkPw() {
  if (document.getElementById("admin-pw").value === ADMIN_PW) {
    document.getElementById("admin-login").style.display = "none";
    document.getElementById("admin-panel").classList.remove("hidden");
    renderAdminGrades();
  } else { alert("❌ 비밀번호 틀렸습니다"); }
}
function renderAdminGrades() {
  const list = document.getElementById("admin-grade-list");
  list.innerHTML = GRADES.map(g => `
    <div class="admin-grade-item">
      <span>${g.emoji} ${g.name}</span>
      <button class="toggle-btn ${locked[g.name] ? 'closed' : 'open'}" onclick="toggleGrade('${g.name}')">
        ${locked[g.name] ? '🔒 잠김' : '🔓 열림'}
      </button>
    </div>`).join("");
}
function toggleGrade(name) {
  locked[name] = !locked[name];
  saveLocked(locked);
  renderAdminGrades();
  renderGradeGrid();
}

// 시작
showMenu();
